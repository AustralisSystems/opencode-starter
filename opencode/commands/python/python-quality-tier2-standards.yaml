# USAGE NOTES
# ============================================================================
usage:
  when_to_load: "Load when you need specific tool configurations or workflow guidance"
  tier_1_prerequisite: "Always load Tier 1 first (core rules)"
  next_tier: "Load Tier 3 (python-quality-tier3-detailed.yaml) for detailed examples"
