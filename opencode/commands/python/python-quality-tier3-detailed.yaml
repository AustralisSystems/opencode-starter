# ============================================================================
# SECTION 6: QUALITY GATES WITH EXAMPLES
# ============================================================================
quality_gates_detailed:
  style_gate_examples:
    black_compliance:
      pass: |
        # Properly formatted
        def calculate_total(items: list[Item]) -> float:
            return sum(item.price for item in items)
      fail: |
        # Improperly formatted
        def calculate_total(items: list[Item])->float:
            return sum(item.price for item in items) # No space before ->

    ruff_compliance:
      pass: |
        # Proper imports
        import os
        import sys

        from mypackage import utils
      fail: |
        # Improper imports
        from mypackage import utils
        import sys  # Should be before local imports
        import os

  type_gate_examples:
    mypy_compliance:
      pass: |
        from typing import Protocol

        class Drawable(Protocol):
            def draw(self) -> None: ...

        def render(obj: Drawable) -> None:
            obj.draw()
      fail: |
        # Missing type hints
        def render(obj):  # Missing parameter type
            obj.draw()  # Return type not specified

  security_gate_examples:
    bandit_compliance:
      pass: |
        # Secure SQL query
        cursor.execute("SELECT * FROM users WHERE id = ?", (user_id,))
      fail: |
        # SQL injection vulnerability
        cursor.execute(f"SELECT * FROM users WHERE id = {user_id}")

    safe_password_handling:
      pass: |
        import secrets
        import hashlib

        def hash_password(password: str) -> str:
            salt = secrets.token_bytes(32)
            return hashlib.pbkdf2_hmac('sha256', password.encode(), salt, 100000).hex()
      fail: |
        # Weak password hashing
        import hashlib

        def hash_password(password: str) -> str:
            return hashlib.md5(password.encode()).hexdigest()

  complexity_gate_examples:
    acceptable_complexity:
      example: |
        # Cyclomatic complexity: 4 (acceptable)
        def process_order(order: Order) -> OrderResult:
            if not order.is_valid():
                return OrderResult.invalid()

            if order.requires_payment():
                if not process_payment(order):
                    return OrderResult.payment_failed()

            order.mark_as_processed()
            return OrderResult.success()

    excessive_complexity:
      example: |
        # Cyclomatic complexity: 18 (too high, needs refactoring)
        def process_complex_order(order: Order) -> OrderResult:
            if not order.is_valid():
                if order.has_items():
                    if order.total > 0:
                        if order.customer.is_premium():
                            if order.requires_shipping():
                                # ... many more nested conditions
                                pass

# ============================================================================
# SECTION 7: ADVANCED PATTERNS AND TROUBLESHOOTING
# ============================================================================
advanced_patterns:
  async_patterns:
    async_context_manager:
      example: |
        from typing import AsyncGenerator

        class AsyncResource:
            async def __aenter__(self):
                await self.acquire()
                return self

            async def __aexit__(self, exc_type, exc_val, exc_tb):
                await self.release()

    async_generator:
      example: |
        async def fetch_pages(url: str) -> AsyncGenerator[Page, None]:
            page_num = 1
            while True:
                page = await fetch_page(url, page_num)
                if not page:
                    break
                yield page
                page_num += 1

  protocol_usage:
    protocol_definition:
      example: |
        from typing import Protocol

        class Comparable(Protocol):
            def __lt__(self, other: 'Comparable') -> bool: ...
            def __gt__(self, other: 'Comparable') -> bool: ...

        def sort_items(items: list[Comparable]) -> list[Comparable]:
            return sorted(items)

  dataclass_patterns:
    frozen_dataclass:
      example: |
        from dataclasses import dataclass, field

        @dataclass(frozen=True)
        class ImmutablePoint:
            x: float
            y: float

            def distance_from_origin(self) -> float:
                return (self.x ** 2 + self.y ** 2) ** 0.5

  dependency_injection:
    constructor_injection:
      example: |
        from typing import Protocol

        class Repository(Protocol):
            def get(self, id: int) -> Entity: ...
            def save(self, entity: Entity) -> None: ...

        class Service:
            def __init__(self, repository: Repository) -> None:
                self._repository = repository

            def process(self, id: int) -> Entity:
                entity = self._repository.get(id)
                entity.process()
                self._repository.save(entity)
                return entity

troubleshooting_guides:
  mypy_issues:
    incompatible_types:
