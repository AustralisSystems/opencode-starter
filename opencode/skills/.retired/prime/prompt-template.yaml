# 🚀 USAGE INSTRUCTIONS FOR META-ORCHESTRATORS

## HOW TO USE THIS TEMPLATE

**CRITICAL**: This template is the SKELETON for spawning PRIME instances via CLI.

### Step 1: Read This Template
```yaml
action: Read entire prompt-template.yaml content
location: .claude/skills/prime/prompt-template.yaml
purpose: Use as skeleton for Bash CLI spawn command
```

### Step 2: Replace ALL Template Variables
```yaml
template_variables:
  {identity}                → "claude-prime" or "sonnet-prime"
  {user_request}            → Complete user request text
  {context}                 → Full context and background
  {project_info}            → Project/repository information
  {constraints}             → Resource limits and requirements

critical: Do NOT leave ANY {variables} unreplaced
```

### Step 3: Construct Bash Command
```python
# PATTERN FOR CLAUDE PRIME (Claude CLI)
Bash(run_in_background=True):
  command: |
    claude --model sonnet --print << 'PRIME_EOF'
    {paste_entire_template_here_with_all_variables_replaced}
    PRIME_EOF

# Note: PRIME is typically the main instance, not spawned
# But this pattern applies if meta-orchestration is used
```

