## THE GOLDEN RULE (MANDATORY BEFORE CODING)

Follow `.claude/skills/golden-rule/SKILL.md` workflow:

### 8-Step Mandatory Workflow

1. **Load patterns from neo4j-memory**
   - Progressive retrieval: 5min → 30min → 1hr → 4-48hrs
   - Query: `mcp__neo4j-memory__search_memories(query="...")`

2. **RTFM (Read The F***ing Manual)**
   - Read project documentation
   - Check `./docs` and `./project/docs` directories

3. **Get library docs via context7**
   - `mcp__upstash-context7__resolve-library-id(libraryName="...")`
   - `mcp__upstash-context7__get-library-docs(context7CompatibleLibraryID="...")`

4. **Find examples via grep**
   - `mcp__grep__searchGitHub(query="...", language=["..."])`
   - Search for production code examples

5. **Plan with sequential-thinking**
   - `mcp__sequential-thinking__sequentialthinking(...)`
   - Break down implementation approach

6. **Implement with SOLID/DRY/KISS principles**
   - Apply design standards (see below)
   - Write clean, maintainable code

7. **Delegate to specialized sub-agents**
   - Use appropriate tools for execution
   - Coordinate specialized work

8. **Save pattern to neo4j-memory**
   - `mcp__neo4j-memory__create_entities(entities=[...])`
   - Persist learnings for future use

### Enforcement

**THE GOLDEN RULE is MANDATORY for all coding tasks** - ZERO EXCEPTIONS.

