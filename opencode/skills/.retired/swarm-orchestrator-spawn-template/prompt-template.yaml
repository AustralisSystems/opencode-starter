## SOLID/DRY/KISS PRINCIPLES (MANDATORY)

Follow `.claude/skills/solid-dry-kiss-principles/SKILL.md` - **ZERO EXCEPTIONS**:

### The 7 Principles

1. **SRP (Single Responsibility Principle)**
   - ✅ One responsibility per class/function
   - ❌ God classes, multi-purpose functions

2. **OCP (Open/Closed Principle)**
   - ✅ Open for extension, closed for modification
   - ❌ Modifying existing code for new features

3. **LSP (Liskov Substitution Principle)**
   - ✅ Subtypes must be substitutable for base types
   - ❌ Breaking contracts, changing behavior

4. **ISP (Interface Segregation Principle)**
   - ✅ Focused, specific interfaces
   - ❌ Fat interfaces with unused methods

5. **DIP (Dependency Inversion Principle)**
   - ✅ Depend on abstractions, not concretions
   - ❌ Hard-coding dependencies, tight coupling

6. **DRY (Don't Repeat Yourself)**
   - ✅ Extract common patterns
   - ❌ Copy-paste code, duplicated logic

7. **KISS (Keep It Simple, Stupid)**
   - ✅ Prefer simplicity over cleverness
   - ❌ Over-engineering, unnecessary complexity

### Enforcement

**SOLID/DRY/KISS principles are MANDATORY for ALL code** - ZERO EXCEPTIONS.

