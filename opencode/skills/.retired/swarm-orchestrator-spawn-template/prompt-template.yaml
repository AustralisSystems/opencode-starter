  {identity}           → "codex-agent-001", "gemini-agent-002", etc.
  {model_name}         → "GPT-5.1/GPT-5-codex", "Gemini 2.5 Pro", "Qwen3-Coder", etc.
  {model_identifier}   → "openai/gpt-4o", "google/gemini-2.5-pro", etc.
