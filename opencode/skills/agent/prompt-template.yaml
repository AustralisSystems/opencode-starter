      )

  time:
    tool: mcp__time__get_current_time
    requirement: For memory query filtering
    usage: Get current timestamp
    example: |
      current_time = mcp__time__get_current_time(timezone="UTC")

OPTIONAL_MCP_TOOLS:
  fetch:
    tool: mcp__fetch__fetch
    requirement: OPTIONAL
    usage: Task-specific research if needed

  web_search:
    tool: WebSearch
    requirement: OPTIONAL
    usage: Current information if needed
```

### Regular Tools (Task Execution Level)

```yaml
DELEGATION_TOOLS:
  skill_tool:
    purpose: Engage skills (.claude/skills/*)
    usage: "Skill(command=\"skill-name\")"
    use_for: Skills like quality-validation, python-typecheck, etc.
    example: |
      Skill(command="python-typecheck"):
        """Check types in auth.py"""

  task_tool:
    purpose: Engage sub-agents (.claude/agents/*)
    usage: "Task(subagent_type=\"sub-agent-name\", prompt=\"...\")"
    use_for: Sub-agents like code-debugger, test-executor-analyzer, etc.
    example: |
      Task(subagent_type="code-debugger",
           prompt="Debug login failure")

NOT_USED_BY_AGENT:
  - Bash tool (orchestrators use this)
  - Direct file operations (sub-agents handle these)
  - Direct spawning (not in agent role)
```

### Sub-Agent Selection Guide

```yaml
task_type_to_sub_agent_mapping:
  type_checking:
    recommended: python-typecheck (Skill)
    alternative: code-quality-analyzer (Task)
    pattern: |
      Skill(command="python-typecheck"):
        """Type check {file}"""

  quality_validation:
    recommended: quality-validation (Skill)
    comprehensive: code-quality-analyzer (Task)
    pattern: |
      Skill(command="quality-validation"):
        """Validate quality of {directory}"""

  code_fixes:
    simple_fixes: code-remediation (Skill)
    complex_fixes: code-planner-implementer (Task)
    pattern: |
      Skill(command="code-remediation"):
        """Fix linting errors in {file}"""

  implementation:
    simple: python-implement (Skill)
    complex: code-planner-implementer (Task)
    pattern: |
      Skill(command="python-implement"):
        """Implement {feature}"""

  testing:
    create_tests: test-implementation (Skill)
    run_and_fix: test-executor-analyzer (Task)
    plan_tests: test-preparation-planner (Task)
    pattern: |
      Skill(command="test-implementation"):
        """Create tests for {module}"""

  debugging:
    always_use: code-debugger (Task)
    pattern: |
      Task(subagent_type="code-debugger",
           prompt="Debug {error_description}")

  deployment:
    simple: deployment-operations-manager (Task)
    complex: deployment-orchestrator (Task)
    pattern: |
      Task(subagent_type="deployment-operations-manager",
           prompt="Deploy and test {service}")

  security:
    always_use: quality-security (Skill)
    pattern: |
      Skill(command="quality-security"):
        """Security scan {directory}"""

  architecture_review:
    always_use: architecture-compliance-reviewer (Task)
    pattern: |
      Task(subagent_type="architecture-compliance-reviewer",
           prompt="Review {component} compliance")
```

### Common Task Patterns

```yaml
pattern_1_sequential_validation:
  description: "Validate, fix, re-validate"
  steps:
    1: Skill(command="python-typecheck") # Check errors
    2: Skill(command="code-remediation") # Fix errors
    3: Skill(command="python-typecheck") # Verify fixed

pattern_2_comprehensive_quality:
  description: "Full quality analysis and remediation"
  steps:
    1: Task(subagent_type="code-quality-analyzer") # Deep analysis
    2: Skill(command="code-remediation") # Fix issues
    3: Skill(command="quality-validation") # Verify all pass

pattern_3_implementation_workflow:
  description: "Research, implement, test"
  steps:
    1: Use context7 and grep for research
    2: Skill(command="python-implement") # Implement
    3: Skill(command="test-implementation") # Create tests
    4: Skill(command="quality-validation") # Validate quality

pattern_4_debug_and_fix:
  description: "Diagnose and remediate"
  steps:
    1: Task(subagent_type="code-debugger") # Find issue
    2: Skill(command="python-implement") # Fix issue
    3: Task(subagent_type="test-executor-analyzer") # Test fix

pattern_5_deployment_validation:
  description: "Deploy and verify"
  steps:
    1: Task(subagent_type="deployment-operations-manager") # Deploy
    2: Task(subagent_type="test-executor-analyzer") # Test live
    3: Skill(command="quality-security") # Security check
```

