# 🚀 USAGE INSTRUCTIONS FOR ORCHESTRATORS

## HOW TO USE THIS TEMPLATE (3-Step Process)

**CRITICAL**: This template is the SKELETON for spawning AGENT instances via CLI.

### Step 1: Read This Entire Template File
```yaml
action: Read entire prompt-template.yaml content
location: .claude/skills/agent/prompt-template.yaml
purpose: Use as skeleton for Bash CLI spawn command
```

### Step 2: Replace ALL Template Variables
```yaml
template_variables:
  {identity}                → "haiku-agent-task-001" (unique agent ID)
  {task}                    → "Fix type error in auth.py:42" (ONE discrete task)
  {input_data}              → "File: auth.py, Line: 42, Error: missing return type"
  {tool_1}, {tool_2}        → "python-typecheck", "python-implement" (specific tools)
  {criterion_1}, {criterion_2} → "Type error resolved", "mypy passes" (success criteria)
  {expected_output_format}  → "Fixed code with validation report"
  {how_to_validate_success} → "Run mypy and verify 0 errors"
  {task_description}        → Detailed context
  {specific_file}           → File paths
  {duration}                → Time estimates
  # ... replace ALL {variables} in template below

critical: Do NOT leave ANY {variables} unreplaced
```

### Step 3: Construct Bash Command with Completed Template
```python
# PATTERN FOR HAIKU AGENT (Claude CLI)
Bash(run_in_background=True):  # ASYNC recommended for parallel execution
  command: |
    claude --model haiku --print << 'AGENT_EOF'
    {paste_entire_template_here_with_all_variables_replaced}
    AGENT_EOF

# PATTERN FOR SONNET AGENT (Claude CLI)
Bash(run_in_background=True):
  command: |
    claude --model sonnet --print << 'AGENT_EOF'
    {paste_entire_template_here_with_all_variables_replaced}
    AGENT_EOF

# PATTERN FOR CODEX AGENT (Codex CLI)
Bash(run_in_background=True):
  command: |
    codex exec <<'AGENT_EOF'
    {paste_entire_template_here_with_all_variables_replaced}
    AGENT_EOF

# PATTERN FOR GROK AGENT (Grok CLI)
Bash(run_in_background=True):
  command: |
    grok --prompt "$(cat <<'AGENT_EOF'
{paste_entire_template_here_with_all_variables_replaced}
AGENT_EOF
)"
```

### CLI Command Reference
```yaml
model_to_cli_mapping:
  Haiku:  "claude --model haiku --print"
  Sonnet: "claude --model sonnet --print"
  Codex:  "codex exec"    # Autonomous non-interactive mode
  Grok:   "grok --prompt"              # Non-interactive prompt mode (use --model for specific model)
```

### Async vs Sync Execution

**Async (RECOMMENDED - Use for Parallel Execution):**
```python
Bash(run_in_background=True):  # Returns immediately with bash_id
  command: "claude --model haiku --print << 'EOF' ..."

# Later: Monitor progress via polling
output = BashOutput(bash_id=returned_bash_id)
while output.status != "completed":
  sleep(2)
  output = BashOutput(bash_id=returned_bash_id)
```

**Sync (RARE - Only for Sequential Dependencies):**
```python
Bash(run_in_background=False):  # Blocks until agent completes
  command: "claude --model haiku --print << 'EOF' ..."
# Waits for completion, then returns full output
```

